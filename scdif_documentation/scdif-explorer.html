<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SCDIF Data Model Explorer</title>
<style>
:root{
  --bg:#f6f7f9; --panel:#ffffff; --ink:#1f2733; --muted:#5b6675;
  --line:#d8dee7; --accent:#3b6fb0;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg)}
#app{position:fixed;inset:0;overflow:hidden;cursor:grab;
  background-image:radial-gradient(#e3e8ef 1px, transparent 1px);background-size:26px 26px;background-color:var(--bg)}
#app.panning{cursor:grabbing}
#canvas{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
#canvas.animate{transition:transform .45s cubic-bezier(.22,.61,.36,1)}
#edges{position:absolute;left:0;top:0;overflow:visible;pointer-events:none;z-index:5}
#regions{position:absolute;left:0;top:0;z-index:1}
#tables{position:absolute;left:0;top:0;z-index:10}

.region{position:absolute;border-radius:18px;border:1.5px dashed;}
.region-title{position:absolute;left:18px;top:8px;font-weight:800;letter-spacing:.3px;
  font-size:30px;opacity:.85;user-select:none}
.region-sub{position:absolute;left:18px;top:42px;font-size:13px;opacity:.6;font-weight:600;user-select:none}

.table{position:absolute;width:240px;background:var(--panel);border:1px solid var(--line);
  border-radius:10px;box-shadow:0 1px 3px rgba(20,30,50,.06),0 6px 18px rgba(20,30,50,.05);
  overflow:hidden;transition:opacity .25s, box-shadow .2s, transform .2s}
.thead{height:36px;display:flex;align-items:center;gap:8px;padding:0 10px;cursor:pointer;
  color:#fff;font-weight:700;user-select:none}
.thead .code{font-size:13px;font-weight:800;background:rgba(255,255,255,.22);
  padding:2px 7px;border-radius:6px;letter-spacing:.5px}
.thead .nm{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fields{list-style:none;margin:0;padding:0}
.field{height:22px;display:flex;align-items:center;gap:7px;padding:0 10px;font-size:11.5px;
  border-top:1px solid #eef1f5;cursor:pointer;color:#2b3543}
.field:hover{background:#eef5ff}
.field .fno{color:#9aa6b4;font-variant-numeric:tabular-nums;min-width:15px;text-align:right;font-size:10.5px}
.field .fnm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.field.active{background:#dcebff;}

#app.has-sel .table:not(.sel):not(.conn){opacity:.22}
.table.sel{box-shadow:0 0 0 3px rgba(59,111,176,.55),0 10px 26px rgba(20,30,50,.18);transform:translateZ(0) scale(1.015)}
.table.conn{box-shadow:0 0 0 2px rgba(40,52,70,.28),0 8px 20px rgba(20,30,50,.12)}

.edge{fill:none;stroke-width:2.25;opacity:.95;stroke-linejoin:round;stroke-linecap:round}
.edge.staff{stroke-dasharray:5 5;opacity:.72;stroke-width:1.8}
.elabel{font-size:11px;font-weight:700;paint-order:stroke;stroke:#fff;stroke-width:3.5px;stroke-linejoin:round}
.elabel-bg{}

/* toolbar */
#toolbar{position:fixed;top:14px;left:14px;z-index:50;display:flex;gap:8px;align-items:center;
  background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:7px 9px;
  box-shadow:0 4px 16px rgba(20,30,50,.08)}
#toolbar button{font:inherit;font-size:13px;font-weight:600;color:var(--ink);background:#fff;
  border:1px solid var(--line);border-radius:8px;padding:6px 11px;cursor:pointer}
#toolbar button:hover{background:#f0f4fa;border-color:#bcc7d6}
#toolbar .title{font-weight:800;font-size:14px;margin-right:4px;padding:0 4px}
#search{font:inherit;font-size:13px;padding:6px 9px;border:1px solid var(--line);border-radius:8px;width:190px}

/* panel */
#panel{position:fixed;top:14px;right:14px;bottom:14px;width:340px;z-index:50;
  background:var(--panel);border:1px solid var(--line);border-radius:14px;
  box-shadow:0 6px 26px rgba(20,30,50,.12);display:flex;flex-direction:column;overflow:hidden}
#panel .phead{padding:14px 16px;border-bottom:1px solid var(--line)}
#panel .ptag{display:inline-block;font-size:11px;font-weight:800;color:#fff;padding:3px 9px;border-radius:7px;letter-spacing:.4px}
#panel h2{margin:9px 0 2px;font-size:17px}
#panel .pcat{font-size:12px;font-weight:700;color:var(--muted)}
#panel .pbody{padding:14px 16px;overflow:auto;flex:1;font-size:13px;line-height:1.5}
#panel .mut{color:var(--muted)}
.section-t{font-size:11px;font-weight:800;letter-spacing:.6px;color:#8a95a4;text-transform:uppercase;margin:16px 0 7px}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;margin:0 5px 5px 0;border:1px solid}
.b-date{background:#eef6ff;border-color:#cfe3fb;color:#2b6cb0}
.b-time{background:#eef6ff;border-color:#cfe3fb;color:#2b6cb0}
.b-fk{background:#eefaf0;border-color:#cdeed3;color:#2f8f5b}
.b-null{background:#f4f5f7;border-color:#dfe3ea;color:#5b6675}
.b-flag{background:#fff5e9;border-color:#f6e0c0;color:#b9772a}
.b-open{background:#fdeef3;border-color:#f7cfdd;color:#bf3f6e}
.b-key{background:#f1eefb;border-color:#ddd2f4;color:#6f4fb0}
.b-enum{background:#eef9f9;border-color:#cdeaea;color:#2f8f8f}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
  background:#f3f6fa;border:1px solid var(--line);border-radius:20px;padding:5px 11px;margin:0 6px 7px 0;cursor:pointer}
.chip:hover{background:#e9f0f8;border-color:#bcc7d6}
.chip .dot{width:9px;height:9px;border-radius:50%}
.chip .k{color:var(--muted);font-weight:600}
.fielddef{background:#f7f9fc;border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-top:4px}
.backlink{font-size:12px;font-weight:700;color:var(--accent);cursor:pointer;user-select:none}
.note{background:#fff7ed;border:1px solid #f6e0c0;border-radius:9px;padding:9px 11px;margin-top:8px;font-size:12px;color:#8a5a1c}
#legend{position:fixed;left:14px;bottom:14px;z-index:50;background:var(--panel);border:1px solid var(--line);
  border-radius:12px;padding:10px 12px;box-shadow:0 4px 16px rgba(20,30,50,.08);max-width:300px}
#legend .lt{font-size:11px;font-weight:800;letter-spacing:.5px;color:#8a95a4;text-transform:uppercase;margin-bottom:7px}
.leg{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;margin:0 10px 6px 0;cursor:pointer}
.leg .sw{width:13px;height:13px;border-radius:4px}
.leg:hover{text-decoration:underline}
.hint{font-size:12px;color:var(--muted);margin-top:6px}
.kbd{font:inherit;font-size:11px;background:#f0f3f7;border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:1px 5px}
</style>
</head>
<body>
<div id="app">
  <div id="canvas">
    <svg id="edges"></svg>
    <div id="regions"></div>
    <div id="tables"></div>
  </div>
</div>

<div id="toolbar">
  <span class="title">SCDIF Explorer</span>
  <button id="btn-fit">Overview</button>
  <button id="btn-zin">+</button>
  <button id="btn-zout">−</button>
  <input id="search" list="reclist" placeholder="Jump to record (e.g. 3A, household)…">
  <datalist id="reclist"></datalist>
</div>

<div id="panel">
  <div class="phead" id="phead"></div>
  <div class="pbody" id="pbody"></div>
</div>

<div id="legend">
  <div class="lt">Categories · click to focus</div>
  <div id="legrows"></div>
  <div class="hint">Drag to pan · scroll to zoom · click a <b>table</b> to see its links · click a <b>field</b> for its definition.</div>
  <div style="font-size:11px;color:#8a95a4;margin-top:6px">© 2026 Vikram Kulkarni · MIT License</div>
</div>

<script>const DATA = {"categories": {"1": {"name": "Person Data", "head": "#3b6fb0"}, "2": {"name": "Communication Data", "head": "#2f8f5b"}, "3": {"name": "Workflow Data", "head": "#c47d2c"}, "5": {"name": "Household Data", "head": "#7d5bb0"}, "6": {"name": "Form Letter / Document Library", "head": "#2f9b9b"}, "7": {"name": "Schedule Data", "head": "#c0507f"}, "8": {"name": "Code Tables", "head": "#5b6470"}}, "records": [{"code": "1A", "name": "Name Data", "cat": "1", "mult": "one per person", "desc": "", "notes": [], "fields": [{"no": 1, "name": "Record Type", "meaning": "1A"}, {"no": 2, "name": "Person ID", "meaning": "Unique ID identifying the person. The key referenced by all other person records."}, {"no": 3, "name": "Person Type", "meaning": "Code for the kind of person — see Person Type Values."}, {"no": 4, "name": "Prefix", "meaning": "e.g. \"Mr.\", \"Mrs.\", \"The Honorable\"."}, {"no": 5, "name": "First Name", "meaning": ""}, {"no": 6, "name": "Middle Name", "meaning": "Middle name or initial."}, {"no": 7, "name": "Last Name", "meaning": ""}, {"no": 8, "name": "Suffix", "meaning": "e.g. \"Jr.\""}, {"no": 9, "name": "Appellation", "meaning": "e.g. \"MD\"."}, {"no": 10, "name": "Organization Name", "meaning": "Used if the record is for an organization, not an individual."}, {"no": 11, "name": "Salutation", "meaning": "Preferred salutation, e.g. \"Bob\" or \"Senator Jones\"."}, {"no": 12, "name": "Date of Birth", "meaning": "YYYYMMDD."}, {"no": 13, "name": "No Mail Flag", "meaning": "\"Y\" if the person has requested no mail to any of their addresses."}, {"no": 14, "name": "Deceased Flag", "meaning": "\"Y\" if the person is deceased."}, {"no": 15, "name": "Spouse's Name", "meaning": ""}, {"no": 16, "name": "Email Flag", "meaning": "\"Y\" if the person's preferred communication method is email."}]}, {"code": "1B", "name": "Address Data", "cat": "1", "mult": "multiple per person, one per address", "desc": "", "notes": [], "fields": [{"no": 1, "name": "Record Type", "meaning": "1B"}, {"no": 2, "name": "Person ID", "meaning": "Must match the Person ID of the associated 1A."}, {"no": 3, "name": "Address ID", "meaning": "Numeric ID/sequence identifying this address."}, {"no": 4, "name": "Address Type", "meaning": "Code for the address kind — see Address Type Values."}, {"no": 5, "name": "Primary Flag", "meaning": "\"Y\" if this is the primary address of this type."}, {"no": 6, "name": "Default Address Flag", "meaning": "\"Y\" if this is the person's default mailing address."}, {"no": 7, "name": "Title", "meaning": "Title tied to an org/business address, e.g. \"CEO\"."}, {"no": 8, "name": "Organization Name", "meaning": "Org/business name when a person's business address."}, {"no": 13, "name": "City", "meaning": ""}, {"no": 14, "name": "State Code", "meaning": "2-letter, e.g. \"VA\", \"DC\", \"MD\"."}, {"no": 15, "name": "Zip Code", "meaning": "XXXXX-XXXX (9-digit) or XXXXX (5-digit); for international, the country's zip."}, {"no": 16, "name": "Carrier Route", "meaning": ""}, {"no": 17, "name": "County", "meaning": ""}, {"no": 18, "name": "Country", "meaning": "For international addresses."}, {"no": 19, "name": "District", "meaning": "Congressional district."}, {"no": 20, "name": "Precinct", "meaning": ""}, {"no": 21, "name": "No Mail Flag", "meaning": "\"Y\" if no mail should go to this address."}, {"no": 22, "name": "Deliverability", "meaning": "\"U\" undeliverable, \"D\" deliverable, \"P\" possibly deliverable, NULL = not verified."}]}, {"code": "1C", "name": "Person Codes", "cat": "1", "mult": "multiple per person", "desc": "", "notes": [], "fields": [{"no": 1, "name": "Record Type", "meaning": "1C"}, {"no": 2, "name": "Person ID", "meaning": "Should match the associated 1A."}, {"no": 3, "name": "Person Code Type", "meaning": "Type of code in field 4 — see Person Code Type Values (PERS, WORK). The same type may repeat."}, {"no": 4, "name": "Code", "meaning": "A code describing the person/agency. Must have a matching 8A record for this person/workflow code."}]}, {"code": "1D", "name": "Person Text (Comments or Notes)", "cat": "1", "mult": "multiple per person", "desc": "", "notes": [], "fields": [{"no": 1, "name": "Record Type", "meaning": "1D"}, {"no": 2, "name": "Person ID", "meaning": "Must match the associated 1A."}, {"no": 3, "name": "1D Sequence Number", "meaning": "Orders the 1D records for a person. Required if Date (5) and Time (6) are NULL."}, {"no": 4, "name": "Text", "meaning": "Freeform comments/notes about the person."}, {"no": 5, "name": "Date", "meaning": "YYYYMMDD."}, {"no": 6, "name": "Time", "meaning": "HH:MM:SS."}, {"no": 7, "name": "User ID", "meaning": "Staffer who entered the text. Must have a matching 8A staff record."}]}, {"code": "1E", "name": "Person Phone/Email", "cat": "1", "mult": "multiple per person", "desc": "", "notes": [], "fields": [{"no": 1, "name": "Record Type", "meaning": "1E"}, {"no": 2, "name": "Person ID", "meaning": "Must match the associated 1A."}, {"no": 3, "name": "Person Phone or Email Type", "meaning": "Type code — see Person Phone/Email Type Values. May repeat."}, {"no": 4, "name": "Phone Number, Email, or URL", "meaning": "The value."}, {"no": 5, "name": "Primary Flag", "meaning": "\"Y\" if primary for this type."}, {"no": 6, "name": "Invalid Flag", "meaning": "\"Y\" if marked invalid/undeliverable."}]}, {"code": "1F", "name": "Person Attachments", "cat": "1", "mult": "multiple per person", "desc": "", "notes": [], "fields": [{"no": 1, "name": "Record Type", "meaning": "1F"}, {"no": 2, "name": "Person ID", "meaning": "Must match the associated 1A."}, {"no": 3, "name": "Document Name", "meaning": "For files not in the document library: the path-qualified file location."}, {"no": 4, "name": "Document ID", "meaning": "For files in the library: must match a 6A Document ID."}, {"no": 5, "name": "User ID", "meaning": "Staffer who attached it. Must have a matching 8A staff record."}, {"no": 6, "name": "Attached Date", "meaning": "YYYYMMDD."}, {"no": 7, "name": "Text", "meaning": "Comments/notes about the attachment."}, {"no": 8, "name": "File name", "meaning": "User-readable file name."}]}, {"code": "1G", "name": "People Demographics", "cat": "1", "mult": "per constituent", "desc": "", "notes": [], "fields": [{"no": 1, "name": "Record Type", "meaning": "1G"}, {"no": 2, "name": "Constituent ID", "meaning": "Should match the associated 1A's Person ID."}, {"no": 3, "name": "Provider", "meaning": "The data provider."}, {"no": 4, "name": "Provider ID", "meaning": "Unique ID from the data provider."}, {"no": 5, "name": "Voter ID", "meaning": "State Voter ID."}, {"no": 6, "name": "Last Updated", "meaning": "Date record last updated."}, {"no": 7, "name": "Regis Date", "meaning": "Voter registration date."}, {"no": 8, "name": "Absentee Voter", "meaning": "\"Y\" if absentee voter."}, {"no": 9, "name": "Marital Status", "meaning": "Single / Non-Tradit / Married."}, {"no": 10, "name": "Have Child", "meaning": "Y/N."}, {"no": 11, "name": "Home Owner", "meaning": "Y/N."}, {"no": 12, "name": "Business Owner", "meaning": "Y/N."}, {"no": 13, "name": "Race", "meaning": ""}, {"no": 14, "name": "Ethnicity", "meaning": ""}, {"no": 15, "name": "Language", "meaning": "Primary language spoken."}, {"no": 16, "name": "Education", "meaning": "Number of years of education."}, {"no": 17, "name": "School Dist", "meaning": ""}, {"no": 18, "name": "State House Dist", "meaning": ""}, {"no": 19, "name": "State Senate Dist", "meaning": ""}, {"no": 20, "name": "Ward", "meaning": ""}, {"no": 21, "name": "Township", "meaning": ""}, {"no": 22, "name": "Borough", "meaning": ""}, {"no": 23, "name": "Precinct", "meaning": ""}, {"no": 24, "name": "Birthyear", "meaning": ""}]}, {"code": "1H", "name": "People Vote History", "cat": "1", "mult": "multiple per constituent", "desc": "A communication is any contact between a person and the office (a constituent's phone call, an outgoing mailing, etc.). Workflow \"action history\" is not here — that lives in 3D.", "notes": [], "fields": [{"no": 1, "name": "Record Type", "meaning": "1H"}, {"no": 2, "name": "Constituent ID", "meaning": "Should match the associated 1A."}, {"no": 3, "name": "Election Year", "meaning": "Year the constituent voted."}, {"no": 4, "name": "Election Type", "meaning": "P, G, or PP."}]}, {"code": "2A", "name": "Communication Data", "cat": "2", "mult": "multiple per person", "desc": "", "notes": [], "fields": [{"no": 1, "name": "Record Type", "meaning": "2A"}, {"no": 2, "name": "Person ID", "meaning": "Must match the associated 1A."}, {"no": 3, "name": "Communication ID", "meaning": "Unique ID for the communication."}, {"no": 4, "name": "Workflow ID", "meaning": "Matches a 3A Workflow ID; NULL if not tied to a workflow."}, {"no": 5, "name": "Workflow Person ID", "meaning": "Matches the 3A's Person ID; NULL if not tied to a workflow."}, {"no": 6, "name": "Communication Type", "meaning": "Type/method, e.g. \"LETTER\", \"EMAIL\", \"PHONE\", \"NEWSLETTER\", \"POST CARD\", \"VISIT\", \"DMAIL\", \"NONE\". Non-exhaustive — examples only, no closed list."}, {"no": 7, "name": "User ID", "meaning": "Staffer who handled it. Must have a matching 8A staff record."}, {"no": 8, "name": "Approved By", "meaning": "Approving staffer's User ID; NULL if no approval required/granted. 8A staff record."}, {"no": 9, "name": "Status", "meaning": "Communication status — all possible values documented; see Communication Status Values."}, {"no": 10, "name": "Date In", "meaning": "Received date YYYYMMDD."}, {"no": 11, "name": "Date Out", "meaning": "Completed date YYYYMMDD."}, {"no": 12, "name": "Reminder date", "meaning": "YYYYMMDD."}, {"no": 13, "name": "Update Date", "meaning": "Last-updated date YYYYMMDD."}, {"no": 14, "name": "Response Type", "meaning": "Reply method, e.g. \"LETTER\", \"EMAIL\". Non-exhaustive — examples only, no closed list."}, {"no": 15, "name": "Address ID", "meaning": "Matches the 1B Address ID the communication was sent to."}, {"no": 16, "name const cats = DATA.categories, records = DATA.records, edges = DATA.edges;
const recByCode = {}; records.forEach(r=>recByCode[r.code]=r);

/* ---------- layout ---------- */
const TW=240,HH=36,RH=22,BP=8,TG=36,CG=46,COLMAX=900,CATPAD=36,CATGAP=92,TITLEH=64,ROWBUDGET=2600;
const catOrder=Object.keys(cats).sort((a,b)=>+a-+b);
const byCat={}; catOrder.forEach(c=>byCat[c]=[]);
records.forEach(r=>byCat[r.cat].push(r));
const tH=r=>HH+r.fields.length*RH+BP;

const blocks=catOrder.map(c=>{
  const list=byCat[c]; let col=0,colY=TITLEH,ncols=1,maxBottom=TITLEH; const pos={};
  list.forEach(r=>{const h=tH(r);
    if(colY!==TITLEH && colY+h>COLMAX){col++;colY=TITLEH;}
    pos[r.code]={x:col*(TW+CG),y:colY,w:TW,h}; colY+=h+TG;
    maxBottom=Math.max(maxBottom,colY-TG); ncols=Math.max(ncols,col+1);});
  return {cat:c, w:ncols*(TW+CG)-CG+CATPAD*2, h:maxBottom+CATPAD, pos};
});
let rx=0,ry=0,rowMaxH=0;
blocks.forEach(b=>{ if(rx>0 && rx+b.w>ROWBUDGET){ry+=rowMaxH+CATGAP;rx=0;rowMaxH=0;}
  b.X=rx;b.Y=ry; rx+=b.w+CATGAP; rowMaxH=Math.max(rowMaxH,b.h);});
const layout={}; let WW=0,WH=0;
blocks.forEach(b=>{ WW=Math.max(WW,b.X+b.w); WH=Math.max(WH,b.Y+b.h);
  Object.keys(b.pos).forEach(code=>{const p=b.pos[code];
    layout[code]={x:b.X+CATPAD+p.x,y:b.Y+p.y,w:p.w,h:p.h,cat:b.cat};});});

edgesSvg.setAttribute('width',WW); edgesSvg.setAttribute('height',WH);

/* ---------- pan / zoom ---------- */
let s=1,tx=0,ty=0;

function animate(on){canvas.classList.toggle('animate',on);}
function fit(pad){pad=pad||90; const aw=app.clientWidth,ah=app.clientHeight;
  s=Math.min((aw-pad*2)/WW,(ah-pad*2)/WH,1.1); s=Math.max(s,.05);
  tx=(aw-WW*s)/2; ty=(ah-WH*s)/2; animate(true); apply(); setTimeout(()=>animate(false),480);}
function fitCat(c){const b=blocks.find(x=>x.cat===c); deselect();
  const aw=app.clientWidth,ah=app.clientHeight; s=Math.min((aw-120)/b.w,(ah-160)/b.h,1.0);
  tx=aw/2-(b.X+b.w/2)*s; ty=ah/2-(b.Y+b.h/2)*s; animate(true);apply();setTimeout(()=>animate(false),480);}

  s=ns||Math.min(Math.max(s,.95),1.25); const cx=L.x+L.w/2, cy=L.y+L.h/2;
  tx=aw/2-cx*s; ty=ah/2-cy*s; animate(true);apply();setTimeout(()=>animate(false),480);}

app.addEventListener('wheel',e=>{e.preventDefault();
  const r=app.getBoundingClientRect(); const mx=e.clientX-r.left,my=e.clientY-r.top;
  const f=Math.exp(-e.deltaY*0.0015); let ns=Math.min(2.2,Math.max(.05,s*f));
  tx=mx-(mx-tx)*(ns/s); ty=my-(my-ty)*(ns/s); s=ns; apply();},{passive:false});

app.addEventListener('pointerdown',e=>{
  if(e.target.closest('.table')||e.target.closest('#panel')||e.target.closest('#toolbar')||e.target.closest('#legend')) return;
  panning=true;moved=false;sx=e.clientX;sy=e.clientY;stx=tx;sty=ty;app.classList.add('panning');app.setPointerCapture(e.pointerId);
});
app.addEventListener('pointermove',e=>{ if(!panning)return;
  const dx=e.clientX-sx,dy=e.clientY-sy; if(Math.abs(dx)+Math.abs(dy)>4)moved=true;
  tx=stx+dx; ty=sty+dy; apply();});
app.addEventListener('pointerup',e=>{ if(panning){panning=false;app.classList.remove('panning');

    const dir=node%5, idx=(node-dir)/5;
    if(idx===goal){const pts=[];let nn=node;
      while(nn!==-1){const dd=nn%5,ii=(nn-dd)/5;pts.push(gctr(ii%GC,(ii/GC)|0));nn=_came[nn];} return pts.reverse();}
    const cr=(idx/GC)|0, cc=idx-cr*GC;
    for(let d=0;d<4;d++){const nc=cc+_D[d][0],nr=cr+_D[d][1]; if(nc<0||nr<0||nc>=GC||nr>=GR)continue;
      const ni=nr*GC+nc; if(OCC[ni]&&ni!==goal)continue;
      const ng=g+GS+((dir<4&&dir!==d)?TURN:0), nk=ni*5+d;
      if(_gen[nk]!==tok||ng<_g[nk]){_g[nk]=ng;_gen[nk]=tok;_came[nk]=node;push(ng+H(nc,nr),nk,ng);}}
  }
  return null;
}
function freeStub(px,py,nx,ny){let x=px+nx*GS,y=py+ny*GS;
  for(let k=0;k<10;k++){const a=gcell(x,y); if(!OCC[a[1]*GC+a[0]])return a; x+=nx*GS;y+=ny*GS;}
  return gcell(x,y);}
function sideOf(L,tx,ty){const cx=L.x+L.w/2,cy=L.y+L.h/2,dx=tx-cx,dy=ty-cy;
  return Math.abs(dx)>=Math.abs(dy)?(dx>0?'E':'W'):(dy>0?'S':'N');}
function portOf(L,side,t){
  if(side==='E')return{px:L.x+L.w,py:gsnap(L.y+t*L.h),nx:1,ny:0};
  if(side==='W')return{px:L.x,py:gsnap(L.y+t*L.h),nx:-1,ny:0};
  if(side==='N')return{px:gsnap(L.x+t*L.w),py:L.y,nx:0,ny:-1};
  return{px:gsnap(L.x+t*L.w),py:L.y+L.h,nx:0,ny:1};}
function simplify(p){if(p.length<3)return p;const o=[p[0]];
  for(let i=1;i<p.length-1;i++){const a=o[o.length-1],b=p[i],c=p[i+1];
    const cl=(Math.abs(a[0]-b[0])<0.5&&Math.abs(b[0]-c[0])<0.5)||(Math.abs(a[1]-b[1])<0.5&&Math.abs(b[1]-c[1])<0.5);
    if(!cl)o.push(b);} o.push(p[p.length-1]); return o;}
function clearEdges(){while(edgesSvg.firstChild)edgesSvg.removeChild(edgesSvg.firstChild);}
function neighbors(code){const out=[];edges.forEach(e=>{
  if(e.from===code)out.push({other:e.to,key:e.key,kind:e.kind,dir:'out'});
  else if(e.to===code)out.push({other:e.from,key:e.key,kind:e.kind,dir:'in'});});return out;}

function drawEdges(code){clearEdges(); const L=layout[code]; const ns=neighbors(code);
  const bySide={}; ns.forEach(n=>{const M=layout[n.other]; n._side=sideOf(L,M.x+M.w/2,M.y+M.h/2);(bySide[n._side]=bySide[n._side]||[]).push(n);});
  Object.keys(bySide).forEach(side=>{const arr=bySide[side];
    arr.sort((a,b)=>{const A=layout[a.other],B=layout[b.other]; return (side==='N'||side==='S')?(A.x-B.x):(A.y-B.y);});
    arr.forEach((n,i)=>{n._t=arr.length===1?0.5:0.16+0.68*(i/(arr.length-1));});});
  ns.forEach(n=>{const M=layout[n.other]; const col=catHead(recByCode[n.other].cat);
    const pS=portOf(L,n._side,n._t); const mSide=sideOf(M,L.x+L.w/2,L.y+L.h/2); const pM=portOf(M,mSide,0.5);
    const a=freeStub(pS.px,pS.py,pS.nx,pS.ny), b=freeStub(pM.px,pM.py,pM.nx,pM.ny);
    const path=astar(a[0],a[1],b[0],b[1]);
    let pts=path?[[pS.px,pS.py]].concat(path).concat([[pM.px,pM.py]]):[[pS.px,pS.py],[pM.px,pM.py]];
    pts=simplify(pts);
    const d='M'+pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L');
    const pe=document.createElementNS(NS,'path'); pe.setAttribute('d',d);
    pe.setAttribute('class','edge'+(n.kind==='staff'?' staff':'')); pe.setAttribute('stroke',col); edgesSvg.appendChild(pe);
    const dot=document.createElementNS(NS,'circle'); dot.setAttribute('cx',pM.px);dot.setAttribute('cy',pM.py);dot.setAttribute('r',4);dot.setAttribute('fill',col); edgesSvg.appendChild(dot);
    let bi=0,bl=-1; for(let i=0;i<pts.length-1;i++){const dl=Math.abs(pts[i][0]-pts[i+1][0])+Math.abs(pts[i][1]-pts[i+1][1]); if(dl>bl){bl=dl;bi=i;}}
    const mx=(pts[bi][0]+pts[bi+1][0])/2,my=(pts[bi][1]+pts[bi+1][1])/2;
    const tEl=document.createElementNS(NS,'text'); tEl.setAttribute('x',mx);tEl.setAttribute('y',my-4);
    tEl.setAttribute('text-anchor','middle');tEl.setAttribute('class','elabel');tEl.setAttribute('fill',col);tEl.textContent=n.key; edgesSvg.appendChild(tEl);
  });
}
function selectTable(code,center){
  selCode=code; app.classList.add('has-sel');
  document.querySelectorAll('.table').forEach(t=>t.classList.remove('sel','conn'));
  document.querySelectorAll('.field.active').forEach(f=>f.classList.remove('active'));
  const conn=new Set(neighbors(code).map(n=>n.other));
  document.getElementById('t-'+code).classList.add('sel');
  conn.forEach(c=>document.getElementById('t-'+c).classList.add('conn'));
  drawEdges(code); showTable(code);
  if(center) centerOn(code);
}
function deselect(){selCode=null;app.classList.remove('has-sel');clearEdges();
  document.querySelectorAll('.table').forEach(t=>t.classList.remove('sel','conn'));
  document.querySelectorAll('.field.active').forEach(f=>f.classList.remove('active'));
  showHome();}

/* ---------- clicks ---------- */
tablesEl.addEventListener('click',e=>{
  const head=e.target.closest('.thead');
  if(head){selectTable(head.dataset.code,true);return;}
  const fld=e.target.closest('.field');
  if(fld){const code=fld.dataset.code, no=+fld.dataset.no;
    if(selCode!==code) selectTable(code,true);
    document.querySelectorAll('.field.active').forEach(f=>f.classList.remove('active'));
    fld.classList.add('active'); showField(code,no);}
});

/* ---------- panel ---------- */
const phead=$('#phead'), pbody=$('#pbody');
function badges(m,name){const b=[];const add=(c,t)=>{if(!b.some(x=>x[1]===t))b.push([c,t]);};
  if(/YYYYMMDD/.test(m))add('b-date','Date · YYYYMMDD');
  if(/HH:MM:SS/.test(m))add('b-time','Time · HH:MM:SS');
  if(/Non-exhaustive/i.test(m))add('b-open','Open value set');
  if(/8A/.test(m))add('b-fk','→ 8A code / staff');
  if(/1A/.test(m))add('b-fk','→ 1A person');
  if(/6A/.test(m))add('b-fk','→ 6A document');
  if(/5A/.test(m))add('b-fk','→ 5A household');
  if(/3A/.test(m))add('b-fk','→ 3A workflow');
  if(/2A/.test(m))add('b-fk','→ 2A communication');
  if(/7H/.test(m))add('b-fk','→ 7H series');
  if(/unique ID/i.test(m))add('b-key','Identifier (key)');
  if(/from the table below|see [A-Z]|Values/.test(m))add('b-enum','Enumerated');
  if(/NULL/.test(m))add('b-null','Nullable');
  if(/"Y"/.test(m)||/Flag/.test(name))add('b-flag','Flag (Y / NULL)');
  return b;}
function tag(code){const r=recByCode[code];return `<span class="ptag" style="background:${catHead(r.cat)}">${code}</span>`;}
function showHome(){
  phead.innerHTML=`<h2 style="margin-top:2px">SCDIF Data Model</h2>
    <div class="pcat">Senate CSS Data Interchange Format</div>`;
  let cl=catOrder.map(c=>`<span class="chip" data-cat="${c}"><span class="dot" style="background:${catHead(c)}"></span>${cats[c].name} <span class="k">${byCat[c].length}</span></span>`).join('');
  pbody.innerHTML=`<p class="mut">An interactive map of the ${records.length} SCDIF record types and the IDs that link them.</p>
    <div class="section-t">How to use</div>
    <p>• <b>Click a table</b> to center it and reveal every record it connects to.<br>
       • <b>Click a field</b> to read its definition and constraints.<br>
       • <b>Scroll</b> to zoom, <b>drag</b> to pan, <b>Overview</b> to see all categories.</p>
    <div class="section-t">Categories</div>${cl}
    <div class="section-t">Reading the links</div>
    <p class="mut">Solid lines are ID references (the label names the linking key). Dashed lines are staff <span class="kbd">User ID</span> references into the <b>8A</b> code table.</p>`;
  pbody.querySelector('.section-t')&&pbody.addEventListener;
  pbody.querySelectorAll('.chip[data-cat]').forEach(ch=>ch.onclick=()=>fitCat(ch.dataset.cat));
}
function showTable(code){const r=recByCode[code];
  phead.innerHTML=`${tag(code)} <span class="ptag" style="background:#eef1f5;color:#5b6675;margin-left:6px">Record</span>
    <h2>${r.name}</h2><div class="pcat" style="color:${catHead(r.cat)}">${cats[r.cat].name}${r.mult?' · '+r.mult:''}</div>`;
  const ns=neighbors(code);
  const grp={};ns.forEach(n=>{(grp[n.key]=grp[n.key]||[]).push(n.other);});
  let links=Object.keys(grp).map(k=>grp[k].map(o=>
    `<span class="chip" data-go="${o}"><span class="dot" style="background:${catHead(recByCode[o].cat)}"></span>${o} <span class="k">${k}</span></span>`).join('')).join('');
  let notes=r.notes&&r.notes.length?`<div class="note">${r.notes.join('<br>')}</div>`:'';
  let flds=r.fields.map(f=>`<li class="field" data-code="${code}" data-no="${f.no}" style="border-top:1px solid #eef1f5"><span class="fno">${f.no}</span><span class="fnm">${f.name}</span></li>`).join('');
  pbody.innerHTML=`${r.desc?`<p class="mut">${r.desc}</p>`:''}${notes}
    <div class="section-t">Connects to (${ns.length})</div>${links||'<span class="mut">No links.</span>'}
    <div class="section-t">Fields (${r.fields.length}) — click for detail</div>
    <ul class="fields" style="border:1px solid var(--line);border-radius:9px;overflow:hidden">${flds}</ul>`;
  pbody.querySelectorAll('.chip[data-go]').forEach(ch=>ch.onclick=()=>selectTable(ch.dataset.go,true));
  pbody.querySelectorAll('.field').forEach(li=>li.onclick=()=>{selectField(code,+li.dataset.no);});
}
function selectField(code,no){selectTable(code,true);
  document.querySelectorAll('.field.active').forEach(f=>f.classList.remove('active'));
  const el=document.querySelector(`#t-${code} .field[data-no="${no}"]`); if(el)el.classList.add('active');
  showField(code,no);}
function showField(code,no){const r=recByCode[code];const f=r.fields.find(x=>x.no===no);
  phead.innerHTML=`${tag(code)} <span class="mut" style="font-size:12px;font-weight:700"> ${r.code} · ${r.name}</span>
    <h2>${f.name}</h2><div class="pcat">Field ${f.no} of ${r.fields.length}</div>`;
  const bs=badges(f.meaning,f.name).map(b=>`<span class="badge ${b[0]}">${b[1]}</span>`).join('');
  pbody.innerHTML=`<div class="backlink" id="bk">‹ Back to ${r.code} record</div>
    <div class="section-t">Definition</div>
    <div class="fielddef">${f.meaning||'<span class="mut">(no description)</span>'}</div>
    ${bs?`<div class="section-t">Properties</div>${bs}`:''}`;
  $('#bk').onclick=()=>selectTable(code,false);
}

/* ---------- search ---------- */
$('#search').addEventListener('change',e=>{
  const v=e.target.value.trim().toUpperCase(); if(!v)return;
  let r=records.find(x=>x.code===v.split(' ')[0])||records.find(x=>x.name.toUpperCase().includes(v))||records.find(x=>(x.code+' — '+x.name).toUpperCase()===v);
  if(r){selectTable(r.code,true);e.target.value=r.code+' — '+r.name;}
});
window.addEventListener('keydown',e=>{if(e.key==='Escape')deselect();});

/* ---------- go ---------- */
showHome(); fit();
window.addEventListener('resize',()=>{if(!selCode)fit();});
</script>
</body>
</html>
